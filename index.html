<!DOCTYPE html>
<html lang="es">
  <head>
    <script>
      // DIAGNÓSTICO CDN — remover después de fix
      const observer = new MutationObserver((mutations) => {
        mutations.forEach((mutation) => {
          mutation.addedNodes.forEach((node) => {
            if (node.tagName === 'SCRIPT' || node.tagName === 'LINK') {
              const src = node.src || node.href || '';
              if (src.includes('cdn') || src.includes('tailwind')) {
                console.error('[CDN DETECTOR] Inyectado por:', node);
                console.error('[CDN DETECTOR] src/href:', src);
                console.trace('[CDN DETECTOR] Stack trace');
              }
            }
          });
        });
      });
      observer.observe(document.documentElement, {
        childList: true,
        subtree: true
      });
      console.log('[CDN DETECTOR] Observando DOM...');
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="Harmony Lab Pro — Composición asistida, exploración armónica y secuenciación rítmica" />
    <meta property="og:title" content="Harmony Lab Pro" />
    <meta property="og:description" content="Tu laboratorio musical interactivo" />
    <meta property="og:image" content="/og-image.png" />
    <title>Harmony Lab Pro</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- Google Fonts se carga desde fonts.css una vez el diseñador entregue el handoff -->
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
